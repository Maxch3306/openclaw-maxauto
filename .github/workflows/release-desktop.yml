name: Release Desktop App

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pkg.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: pkg
        run: echo "version=$(node -p "require('./max-auto/package.json').version")" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            max-auto
            .github
          sparse-checkout-cone-mode: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: max-auto/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install frontend deps
        run: pnpm install
        working-directory: max-auto

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: max-auto
          tagName: v${{ needs.version.outputs.version }}
          releaseName: "MaxAuto v${{ needs.version.outputs.version }}"
          releaseBody: "Desktop installer for MaxAuto v${{ needs.version.outputs.version }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
